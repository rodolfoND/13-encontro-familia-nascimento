    <div id="root"></div>

    <script type="text/babel">
      var useState = React.useState;
      var useEffect = React.useEffect;

      /* ---------- Countdown ---------- */
      function useCountdown(targetDate) {
        var initial = new Date(targetDate).getTime() - Date.now();
        var state = useState(initial);
        var diff = state[0];
        var setDiff = state[1];

        useEffect(function () {
          var id = setInterval(function () {
            setDiff(new Date(targetDate).getTime() - Date.now());
          }, 1000);
          return function () {
            clearInterval(id);
          };
        }, []);

        return {
          days: Math.max(0, Math.floor(diff / 86400000)),
          hours: Math.max(0, Math.floor((diff % 86400000) / 3600000)),
          minutes: Math.max(0, Math.floor((diff % 3600000) / 60000)),
          seconds: Math.max(0, Math.floor((diff % 60000) / 1000)),
        };
      }

      function CountdownUnit(props) {
        var value = props.value;
        var label = props.label;
        return (
          <div className="countdown-unit">
            <span className="countdown-num">
              {String(value).padStart(2, "0")}
            </span>
            <span className="countdown-label">{label}</span>
          </div>
        );
      }

      /* ---------- FAQ ---------- */
      var faqs = [
        {
          q: "Onde será o encontro?",
          a: "O encontro será em um sítio no Povoado da Matinha, em Pará de Minas — MG. Por ser zona rural não há endereço convencional, mas a localização GPS está disponível no card de informações da página. Em breve também divulgaremos um vídeo mostrando como chegar!",
        },
        {
          q: "Tem lugar para dormir no sítio?",
          a: "Sim! O sítio comporta cerca de 30 pessoas nos dormitórios. O espaço é amplo, então quem se sentir confortável em trazer colchão ou barraca facilitaria bastante. Além disso, há vagas para dormir na casa do Rodolfo e na casa da Margarete — entre em contato com a organização. Para quem preferir hotel, indicamos opções na seção de hospedagem.",
        },
        {
          q: "O que está incluso nos R$ 250?",
          a: "O valor cobre alimentação completa durante os dois dias (19 e 20/09), incluindo café da manhã, almoço, lanche e jantar, além de água, sucos e refrigerantes. Bebidas alcoólicas não estão inclusas.",

      /* ---------- Copy PIX Button ---------- */
      function CopyPixButton() {
        var state = useState("Copiar chave PIX");
        var label = state[0];
        var setLabel = state[1];

        function handleCopy() {
          navigator.clipboard.writeText("37999954557").then(function() {
            setLabel("✅ Copiado!");
            setTimeout(function() { setLabel("Copiar chave PIX"); }, 2500);
          });
        }

        return (
          <button
            onClick={handleCopy}
            style={{
              marginTop: 12,
              background: label === "✅ Copiado!" ? "#15803D" : "var(--yellow-400)",
              color: label === "✅ Copiado!" ? "#fff" : "var(--blue-900)",
              border: "none", borderRadius: 50,
              padding: "8px 20px",
              fontWeight: 800, fontSize: "0.85rem",
              cursor: "pointer",
              transition: "background 0.3s, color 0.3s",
              width: "100%",
            }}
          >
            {label === "✅ Copiado!" ? "✅ Copiado!" : "📋 Copiar chave PIX"}
          </button>
        );
      }
